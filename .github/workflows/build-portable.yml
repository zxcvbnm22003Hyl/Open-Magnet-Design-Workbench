name: Build Portable Package

on:
  workflow_dispatch:
    inputs:
      bundle_profile:
        description: Portable bundle profile
        required: true
        default: AppOnly
        type: choice
        options:
          - AppOnly
          - WorkspaceFull
  push:
    branches:
      - main
    paths:
      - "project_rat_gui.py"
      - "project_rat_gui_qt.py"
      - "project_rat_cct.py"
      - "workspace-overlays/**"
      - "scripts/**"
      - ".github/workflows/build-portable.yml"
      - "README.md"

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PySide6 vtk

      - name: Build portable bundle
        shell: pwsh
        run: |
          $profile = "${{ github.event.inputs.bundle_profile }}"
          if ([string]::IsNullOrWhiteSpace($profile)) {
            $profile = "AppOnly"
          }
          .\scripts\build_portable_bundle.ps1 -WorkspaceRoot $PWD -BundleProfile $profile -PythonExe (Get-Command python).Source -Clean

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-rat-portable
          path: artifacts/*.zip
